<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quest Saya — YUKgas.in</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@600;700;800&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.460.0/dist/umd/lucide.min.js" onload="if(window.YG){YG.initLucide()}else{window.lucide&&lucide.createIcons()}"></script>
    <link rel="stylesheet" href="/assets/style.css">

    <script>
        tailwind.config = {
            theme: { extend: {
                fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'], mono: ['"JetBrains Mono"', 'monospace'] },
                colors: {
                    sunset: '#FF6B35', 'sunset-light': '#FF9F1C', golden: '#FFB627',
                    teal: { 50: '#E6FAF5', 500: '#0CA789', 600: '#0A8E78' }, coral: '#FF4757',
                    cream: { DEFAULT: '#FFF8F0', deep: '#FFF0E0' },
                    espresso: '#2D1B12', mocha: '#8B7355', latte: '#B8A088',
                    borderWarm: '#FFE4D1'
                }
            }}
        }
    </script>
</head>
<body class="bg-cream text-espresso font-sans antialiased">

    <!-- Full Screen Responsive Container -->
    <div class="w-full min-h-screen bg-cream relative flex flex-col">



        <!-- Header -->
        <header class="bg-white border-b-2 border-cream-deep sticky top-0 z-50 px-4 py-3 md:py-4 shadow-warm-sm">
            <div class="max-w-md md:max-w-5xl lg:max-w-6xl xl:max-w-7xl mx-auto w-full">
                
                <!-- Mobile Header Layout (hidden on desktop) -->
                <div class="flex flex-col gap-3 md:hidden">
                    <div class="flex items-center justify-between">
                        <a href="/dashboard" class="w-10 h-10 flex items-center justify-center -ml-2 text-mocha hover:bg-cream-deep rounded-xl transition-colors">
                            <i data-lucide="arrow-left" class="w-6 h-6"></i>
                        </a>
                        <h1 class="font-extrabold text-lg">Quest Saya</h1>
                        <a href="/quests/create" class="w-10 h-10 flex items-center justify-center rounded-xl text-sunset hover:bg-sunset/10 transition-colors">
                            <i data-lucide="plus-circle" class="w-6 h-6"></i>
                        </a>
                    </div>
                    
                    <!-- Tabs (Mobile) -->
                    <div class="flex mt-1 bg-cream-deep rounded-2xl p-1 w-full">
                        <button onclick="switchTab('given')" id="tab-given" class="flex-1 py-2.5 rounded-xl text-sm font-bold flex items-center justify-center gap-2 bg-white text-sunset shadow-warm transition-all">
                            <i data-lucide="megaphone" class="w-4 h-4"></i>
                            <span>Diberikan</span>
                            <span class="bg-sunset/15 text-sunset px-1.5 py-0.5 rounded-md text-[10px] font-extrabold">0</span>
                        </button>
                        <button onclick="switchTab('taken')" id="tab-taken" class="flex-1 py-2.5 rounded-xl text-sm font-bold flex items-center justify-center gap-2 text-mocha hover:text-espresso transition-all">
                            <i data-lucide="hand" class="w-4 h-4"></i>
                            <span>Diambil</span>
                            <span class="bg-white/60 text-mocha px-1.5 py-0.5 rounded-md text-[10px] font-extrabold">0</span>
                        </button>
                    </div>
                </div>

                <!-- Desktop Header Layout (hidden on mobile) -->
                <div class="hidden md:flex items-center justify-between gap-4">
                    <!-- Brand -->
                    <a href="/dashboard" class="flex items-center gap-2.5 group shrink-0">
                        <div class="w-9 h-9 bg-gradient-to-br from-sunset to-sunset-light rounded-xl flex items-center justify-center text-white shadow-warm group-hover:scale-110 group-hover:rotate-6 transition-all duration-300">
                            <i data-lucide="users-round" class="w-5 h-5"></i>
                        </div>
                        <span class="font-extrabold text-xl tracking-tight">YUKgas<span class="text-sunset">.in</span></span>
                    </a>

                    <!-- Desktop Tabs (Center aligned) -->
                    <div class="flex bg-cream-deep rounded-2xl p-1 w-full max-w-sm mx-4">
                        <button onclick="switchTab('given')" id="tab-given-desktop" class="flex-1 py-2 rounded-xl text-sm font-bold flex items-center justify-center gap-2 bg-white text-sunset shadow-warm transition-all">
                            <i data-lucide="megaphone" class="w-4 h-4"></i>
                            <span>Diberikan</span>
                            <span class="bg-sunset/15 text-sunset px-1.5 py-0.5 rounded-md text-[10px] font-extrabold">0</span>
                        </button>
                        <button onclick="switchTab('taken')" id="tab-taken-desktop" class="flex-1 py-2 rounded-xl text-sm font-bold flex items-center justify-center gap-2 text-mocha hover:text-espresso transition-all">
                            <i data-lucide="hand" class="w-4 h-4"></i>
                            <span>Diambil</span>
                            <span class="bg-white/60 text-mocha px-1.5 py-0.5 rounded-md text-[10px] font-extrabold">0</span>
                        </button>
                    </div>

                    <!-- Navigation Links & Profile (Desktop) -->
                    <div class="flex items-center gap-6">
                        <a href="/dashboard" class="flex items-center gap-1.5 text-sm font-semibold text-mocha hover:text-espresso transition-colors">
                            <i data-lucide="layout-grid" class="w-4 h-4"></i>
                            <span>Feed</span>
                        </a>
                        <a href="/my-quests" class="flex items-center gap-1.5 text-sm font-bold text-sunset">
                            <i data-lucide="list-checks" class="w-4 h-4"></i>
                            <span>QuestKu</span>
                        </a>
                        <a href="/notifications" class="flex items-center gap-1.5 text-sm font-semibold text-mocha hover:text-espresso transition-colors relative">
                            <i data-lucide="bell" class="w-4 h-4"></i>
                            <span>Notif</span>
                            <span class="absolute -top-1.5 -right-2 bg-coral text-white text-[8px] font-bold px-1.5 py-0.2 rounded-full leading-none notif-badge-desktop hidden">0</span>
                        </a>
                        <a href="/profile" class="flex items-center gap-2 text-sm font-semibold text-mocha hover:text-espresso transition-colors border-l pl-6 border-cream-deep">
                            <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-golden to-sunset-light flex items-center justify-center font-bold text-white text-xs">F</div>
                            <span>Profil</span>
                        </a>
                        <!-- Prominent Add button in header on desktop -->
                        <a href="/quests/create" class="btn-sunset px-5 py-2 text-sm flex items-center gap-1.5 text-white hover:scale-105 transition-transform shrink-0">
                            <i data-lucide="plus" class="w-4 h-4"></i>
                            <span>Gas!</span>
                        </a>
                    </div>
                </div>

            </div>
        </header>


        <!-- Filter Chips -->
        <div class="bg-white/50 border-b border-cream-deep py-3 md:py-4">
            <div class="max-w-md md:max-w-5xl lg:max-w-6xl xl:max-w-7xl mx-auto w-full px-4 md:px-8">
                <div class="flex gap-2.5 overflow-x-auto no-scrollbar md:flex-wrap md:justify-start">
                    <button onclick="filterChip(this)" class="filter-chip active px-4 py-2 rounded-full text-sm font-bold bg-espresso text-white whitespace-nowrap flex items-center gap-1.5">
                        <i data-lucide="layers" class="w-4 h-4"></i> Semua
                    </button>
                    <button onclick="filterChip(this)" class="filter-chip px-4 py-2 rounded-full text-sm font-semibold bg-white text-mocha border-2 border-cream-deep whitespace-nowrap flex items-center gap-1.5 hover:border-sunset transition-colors">
                        <i data-lucide="circle-dashed" class="w-4 h-4"></i> Open
                    </button>
                    <button onclick="filterChip(this)" class="filter-chip px-4 py-2 rounded-full text-sm font-semibold bg-white text-mocha border-2 border-cream-deep whitespace-nowrap flex items-center gap-1.5 hover:border-sunset transition-colors">
                        <i data-lucide="user-check" class="w-4 h-4"></i> Taken
                    </button>
                    <button onclick="filterChip(this)" class="filter-chip px-4 py-2 rounded-full text-sm font-semibold bg-white text-mocha border-2 border-cream-deep whitespace-nowrap flex items-center gap-1.5 hover:border-sunset transition-colors">
                        <i data-lucide="loader" class="w-4 h-4"></i> In Progress
                    </button>
                    <button onclick="filterChip(this)" class="filter-chip px-4 py-2 rounded-full text-sm font-semibold bg-white text-mocha border-2 border-cream-deep whitespace-nowrap flex items-center gap-1.5 hover:border-sunset transition-colors">
                        <i data-lucide="check-circle-2" class="w-4 h-4"></i> Completed
                    </button>
                </div>
            </div>
        </div>


        <!-- Feed -->
        <main class="flex-1 max-w-md md:max-w-5xl lg:max-w-6xl xl:max-w-7xl mx-auto w-full px-4 py-6 md:py-8 pb-32 md:pb-16 flex flex-col gap-6">
            <!-- ===================== TAB: DIBERIKAN ===================== -->
            <div id="content-given" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">


                <!-- Empty State (Diberikan) -->
                <div id="empty-given" class="hidden col-span-full flex-col items-center justify-center py-16 px-6 text-center">
                    <div class="w-24 h-24 bg-sunset/10 rounded-3xl flex items-center justify-center mb-6 animate-float">
                        <i data-lucide="megaphone" class="w-12 h-12 text-sunset"></i>
                    </div>
                    <h3 class="text-xl font-extrabold mb-2">Belum ada quest diberikan</h3>

                    <p class="text-mocha mb-6 leading-relaxed">Posting quest pertamamu dan temukan seseorang yang siap bantu!</p>
                    <a href="/quests/create" class="btn-sunset inline-flex items-center gap-2">
                        <i data-lucide="plus" class="w-5 h-5"></i>
                        <span>Posting Quest</span>
                    </a>
                </div>

            </div>

            <!-- ===================== TAB: DIAMBIL ===================== -->
            <div id="content-taken" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 hidden">


                <!-- Empty State (Diambil) -->
                <div id="empty-taken" class="hidden col-span-full flex-col items-center justify-center py-16 px-6 text-center">
                    <div class="w-24 h-24 bg-teal-50 rounded-3xl flex items-center justify-center mb-6 animate-float">
                        <i data-lucide="hand" class="w-12 h-12 text-teal-500"></i>
                    </div>
                    <h3 class="text-xl font-extrabold mb-2">Belum ada quest diambil</h3>

                    <p class="text-mocha mb-6 leading-relaxed">Jelajahi feed dan ambil quest untuk mulai membantu teman!</p>
                    <a href="/dashboard" class="btn-sunset inline-flex items-center gap-2">
                        <i data-lucide="layout-grid" class="w-5 h-5"></i>
                        <span>Jelajahi Quest</span>
                    </a>
                </div>

            </div>

        </main>

        <!-- Bottom Nav -->
        <nav class="absolute bottom-0 left-0 right-0 bg-white/95 backdrop-blur-lg border-t-2 border-cream-deep px-4 py-3 pb-safe z-40 md:hidden" style="padding-bottom: env(safe-area-inset-bottom, 12px);">
            <div class="max-w-lg mx-auto flex items-center justify-around w-full">
                <a href="/dashboard" class="flex flex-col items-center gap-1 px-2 py-1 group">
                    <div class="w-10 h-10 rounded-xl text-mocha flex items-center justify-center group-hover:bg-cream-deep group-hover:scale-110 transition-all">
                        <i data-lucide="layout-grid" class="w-5 h-5"></i>
                    </div>
                    <span class="text-[10px] font-semibold text-mocha">Feed</span>
                </a>
                <a href="/my-quests" class="flex flex-col items-center gap-1 px-2 py-1 group">
                    <div class="w-10 h-10 rounded-xl bg-sunset/10 text-sunset flex items-center justify-center group-hover:scale-110 transition-transform">
                        <i data-lucide="list-checks" class="w-5 h-5"></i>
                    </div>
                    <span class="text-[10px] font-bold text-sunset">QuestKu</span>
                </a>
                <!-- FAB Create -->
                <a href="/quests/create" class="flex flex-col items-center gap-1 -mt-6">
                    <div class="w-14 h-14 rounded-full bg-gradient-to-br from-sunset to-sunset-light flex items-center justify-center shadow-warm-lg hover:scale-110 hover:rotate-90 transition-all duration-300">
                        <i data-lucide="plus" class="w-7 h-7 text-white"></i>
                    </div>
                    <span class="text-[10px] font-bold text-sunset">Gas!</span>
                </a>
                <a href="/notifications" class="flex flex-col items-center gap-1 px-2 py-1 group relative">
                    <div class="w-10 h-10 rounded-xl text-mocha flex items-center justify-center group-hover:bg-cream-deep group-hover:scale-110 transition-all">
                        <i data-lucide="bell" class="w-5 h-5"></i>
                    </div>
                    <span class="absolute top-0 right-0 w-4 h-4 bg-coral rounded-full text-[8px] text-white font-bold flex items-center justify-center border border-white notif-badge-mobile hidden">0</span>
                    <span class="text-[10px] font-semibold text-mocha">Notif</span>
                </a>
                <a href="/profile" class="flex flex-col items-center gap-1 px-2 py-1 group">
                    <div class="w-10 h-10 rounded-xl text-mocha flex items-center justify-center group-hover:bg-cream-deep group-hover:scale-110 transition-all">
                        <i data-lucide="user" class="w-5 h-5"></i>
                    </div>
                    <span class="text-[10px] font-semibold text-mocha">Profil</span>
                </a>
            </div>
        </nav>



    </div>

    <script src="/assets/app.js"></script>
    <script src="/assets/notif-badge.js"></script>
    <script>
        let activeTab = 'given'; // 'given' or 'taken'
        let activeStatus = 'ALL';

        // Check Authentication Session
        if (!YG_AUTH.getToken()) {
            window.location.href = '/login';
        }

        const currentUser = YG_AUTH.getUser();

        // Update desktop avatar initials
        const initials = currentUser.fullName.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
        document.querySelectorAll('a[href="/profile"] .rounded-xl, a[href="/profile"] .rounded-lg, #desktop-avatar').forEach(el => {
            el.textContent = initials;
        });

        // Tab switcher
        function switchTab(tab) {
            activeTab = tab;
            const tabGiven = document.getElementById('tab-given');
            const tabTaken = document.getElementById('tab-taken');
            const tabGivenD = document.getElementById('tab-given-desktop');
            const tabTakenD = document.getElementById('tab-taken-desktop');
            const contentGiven = document.getElementById('content-given');
            const contentTaken = document.getElementById('content-taken');

            if (tab === 'given') {
                [tabGiven, tabGivenD].forEach(el => {
                    if (el) {
                        el.classList.add('bg-white', 'text-sunset', 'shadow-warm');
                        el.classList.remove('text-mocha');
                    }
                });
                [tabTaken, tabTakenD].forEach(el => {
                    if (el) {
                        el.classList.remove('bg-white', 'text-sunset', 'shadow-warm');
                        el.classList.add('text-mocha');
                    }
                });

                contentTaken.classList.add('hidden');
                contentGiven.classList.remove('hidden');
            } else {
                [tabTaken, tabTakenD].forEach(el => {
                    if (el) {
                        el.classList.add('bg-white', 'text-sunset', 'shadow-warm');
                        el.classList.remove('text-mocha');
                    }
                });
                [tabGiven, tabGivenD].forEach(el => {
                    if (el) {
                        el.classList.remove('bg-white', 'text-sunset', 'shadow-warm');
                        el.classList.add('text-mocha');
                    }
                });

                contentGiven.classList.add('hidden');
                contentTaken.classList.remove('hidden');
            }

            loadMyQuests();
        }

        // Filter chips switcher
        function filterChip(btn) {
            const text = btn.textContent.trim();
            let status = 'ALL';
            if (text.includes('Open')) status = 'OPEN';
            else if (text.includes('Taken')) status = 'TAKEN';
            else if (text.includes('In Progress')) status = 'IN_PROGRESS';
            else if (text.includes('Completed')) status = 'COMPLETED';

            activeStatus = status;

            document.querySelectorAll('.filter-chip').forEach(c => {
                c.classList.remove('active', 'bg-espresso', 'text-white');
                c.classList.add('bg-white', 'text-mocha', 'border-2', 'border-cream-deep');
            });
            btn.classList.add('active', 'bg-espresso', 'text-white');
            btn.classList.remove('bg-white', 'text-mocha', 'border-2', 'border-cream-deep');

            loadMyQuests();
        }

        // Load quests from API
        async function loadMyQuests() {
            const targetContainer = activeTab === 'given' 
                ? document.getElementById('content-given') 
                : document.getElementById('content-taken');

            const emptyState = activeTab === 'given'
                ? document.getElementById('empty-given')
                : document.getElementById('empty-taken');

            // Hide empty state and show loading spinner inside container
            if (emptyState) emptyState.classList.add('hidden');
            
            // Retain original empty state element and clear other items
            const spinnerHtml = `
                <div class="col-span-full flex flex-col items-center justify-center py-12 text-mocha">
                    <svg class="animate-spin-slow w-8 h-8 mb-3" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-90" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                    </svg>
                    <p class="font-medium">Memuat quest Anda...</p>
                </div>
            `;
            
            // Re-render container cleanly
            const emptyHtml = emptyState ? emptyState.outerHTML : '';
            targetContainer.innerHTML = emptyHtml + spinnerHtml;

            try {
                const endpoint = activeTab === 'given' ? 'quests/given' : 'quests/taken';
                let url = `${window.API_BASE_URL}/users/${endpoint}?limit=50`;
                if (activeStatus !== 'ALL') {
                    url += `&status=${activeStatus}`;
                }

                const response = await fetch(url, {
                    headers: YG_AUTH.getHeaders()
                });
                const data = await response.json();

                if (!data.success) {
                    targetContainer.innerHTML = emptyHtml + `<p class="col-span-full text-center text-coral py-8 font-semibold">${data.message || 'Gagal memuat quest Anda.'}</p>`;
                    return;
                }

                const quests = data.data.quests;

                // Update tab count badges dynamically from API total
                if (activeStatus === 'ALL') {
                    const badgeSelector = activeTab === 'given' 
                        ? '#tab-given span.font-extrabold, #tab-given-desktop span.font-extrabold'
                        : '#tab-taken span.font-extrabold, #tab-taken-desktop span.font-extrabold';
                    document.querySelectorAll(badgeSelector).forEach(el => {
                        el.textContent = data.data.pagination.total;
                    });
                }

                if (quests.length === 0) {
                    targetContainer.innerHTML = emptyHtml;
                    const newEmptyState = targetContainer.querySelector(activeTab === 'given' ? '#empty-given' : '#empty-taken');
                    if (newEmptyState) newEmptyState.classList.remove('hidden');
                    return;
                }

                // Render dynamic card items
                const CAT_LABELS = {
                    TRANSPORT: '🚗 Transportasi',
                    FOOD: '🍔 Makanan',
                    ADMIN: '📄 Administrasi',
                    OTHER: '📦 Lainnya'
                };
                const CAT_ICONS = {
                    TRANSPORT: 'bike',
                    FOOD: 'utensils-crossed',
                    ADMIN: 'printer',
                    OTHER: 'package-2'
                };

                const cardsHtml = quests.map((q, index) => {
                    const priceFormatted = new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(q.compensation);
                    
                    let statusLabel = '';
                    let statusBadgeClass = '';
                    let statusIcon = '';

                    if (q.status === 'OPEN') {
                        statusLabel = 'OPEN';
                        statusBadgeClass = 'badge-open';
                        statusIcon = 'circle-dashed';
                    } else if (q.status === 'TAKEN') {
                        statusLabel = 'TAKEN';
                        statusBadgeClass = 'badge-progress';
                        statusIcon = 'user-check';
                    } else if (q.status === 'IN_PROGRESS') {
                        statusLabel = 'BERJALAN';
                        statusBadgeClass = 'badge-progress';
                        statusIcon = 'loader';
                    } else if (q.status === 'COMPLETED') {
                        statusLabel = q.paymentConfirmed ? 'SELESAI' : 'MENUNGGU BAYAR';
                        statusBadgeClass = 'badge-done';
                        statusIcon = 'check-circle-2';
                    } else if (q.status === 'CANCELLED') {
                        statusLabel = 'BATAL';
                        statusBadgeClass = 'badge-cancel';
                        statusIcon = 'x-circle';
                    }

                    // Render card footer
                    let footerHtml = '';
                    if (activeTab === 'given') {
                        if (q.taker) {
                            const takerInit = q.taker.fullName.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
                            footerHtml = `
                                <div class="flex items-center gap-2">
                                    <div class="w-7 h-7 rounded-lg bg-teal-50 text-teal-500 flex items-center justify-center text-xs font-extrabold">${takerInit}</div>
                                    <span class="text-xs font-semibold">${q.taker.fullName.split(' ')[0]} mengambil</span>
                                </div>
                            `;
                        } else {
                            footerHtml = `
                                <div class="flex items-center gap-2">
                                    <div class="w-7 h-7 rounded-lg border-2 border-dashed border-borderWarm flex items-center justify-center">
                                        <i data-lucide="user" class="w-3.5 h-3.5 text-latte"></i>
                                    </div>
                                    <span class="text-xs font-semibold text-mocha">Belum ada pengambil</span>
                                </div>
                            `;
                        }
                    } else {
                        const giverInit = q.giver.fullName.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
                        footerHtml = `
                            <div class="flex items-center gap-2">
                                <div class="w-7 h-7 rounded-lg bg-golden/20 text-golden flex items-center justify-center text-xs font-extrabold">${giverInit}</div>
                                <span class="text-xs font-semibold">Dari ${q.giver.fullName.split(' ')[0]}</span>
                            </div>
                        `;
                    }

                    const isCancelled = q.status === 'CANCELLED';

                    return `
                        <a href="/quests/${q.id}" class="warm-card block p-4 relative animate-reveal transition-all hover:-translate-y-1 hover:shadow-warm ${isCancelled ? 'opacity-60' : ''}" style="animation-delay: ${index * 40}ms">
                            <div class="flex items-start justify-between mb-2 gap-2">
                                <div class="flex items-center gap-2 flex-wrap">
                                    <span class="text-xs font-bold text-sunset bg-sunset/10 px-2.5 py-1 rounded-full flex items-center gap-1">
                                        <i data-lucide="${CAT_ICONS[q.category] || 'tag'}" class="w-3 h-3"></i> ${CAT_LABELS[q.category] || 'Lainnya'}
                                    </span>
                                    <span class="${statusBadgeClass} text-xs font-bold px-2.5 py-1 rounded-full flex items-center gap-1">
                                        <i data-lucide="${statusIcon}" class="w-3 h-3 ${q.status === 'IN_PROGRESS' ? 'animate-spin-slow' : ''}"></i> ${statusLabel}
                                    </span>
                                </div>
                                <span class="price-badge text-sm whitespace-nowrap">${priceFormatted}</span>
                            </div>
                            <h3 class="font-extrabold text-base mb-2 mt-1 ${isCancelled ? 'line-through decoration-latte' : ''}">${q.title}</h3>
                            <div class="flex items-center gap-3 text-xs text-mocha">
                                <span class="flex items-center gap-1"><i data-lucide="map-pin" class="w-3.5 h-3.5"></i> ${q.location}</span>
                            </div>
                            <div class="flex items-center justify-between mt-3 pt-3 border-t border-cream-deep">
                                ${footerHtml}
                                <span class="text-xs font-bold text-sunset flex items-center gap-1">Lihat <i data-lucide="arrow-right" class="w-3.5 h-3.5"></i></span>
                            </div>
                        </a>
                    `;
                }).join('');

                targetContainer.innerHTML = emptyHtml + cardsHtml;

                if (window.lucide) lucide.createIcons();

            } catch (error) {
                console.error('Load My Quests Error:', error);
                targetContainer.innerHTML = emptyHtml + `<p class="col-span-full text-center text-coral py-8 font-semibold">Gagal terhubung ke server backend.</p>`;
            }
        }

        async function updateAllTabBadges() {
            try {
                const [resGiven, resTaken] = await Promise.all([
                    fetch(`${window.API_BASE_URL}/users/quests/given?limit=1`, { headers: YG_AUTH.getHeaders() }),
                    fetch(`${window.API_BASE_URL}/users/quests/taken?limit=1`, { headers: YG_AUTH.getHeaders() })
                ]);
                const dataGiven = await resGiven.json();
                const dataTaken = await resTaken.json();

                if (dataGiven.success) {
                    document.querySelectorAll('#tab-given span.font-extrabold, #tab-given-desktop span.font-extrabold').forEach(el => {
                        el.textContent = dataGiven.data.pagination.total;
                    });
                }
                if (dataTaken.success) {
                    document.querySelectorAll('#tab-taken span.font-extrabold, #tab-taken-desktop span.font-extrabold').forEach(el => {
                        el.textContent = dataTaken.data.pagination.total;
                    });
                }
            } catch (e) {
                console.error('Update tab badges error:', e);
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            loadMyQuests();
            updateAllTabBadges();
        });
    </script>
</body>
</html>
