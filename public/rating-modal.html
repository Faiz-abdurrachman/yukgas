<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rating Modal — YUKgas.in</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
                    colors: {
                    colors: {
                        orange: {
                            50: '#FFF7ED',
                            100: '#FFEDD5',
                            500: '#F97316',
                            600: '#EA580C',
                        },
                        amber: {
                            50: '#FFFBEB',
                            400: '#FBBF24',
                            500: '#F59E0B',
                        },
                        emerald: {
                            50: '#ECFDF5',
                            500: '#10B981',
                            600: '#059669',
                        },
                        red: {
                            50: '#FEF2F2',
                            200: '#FECACA',
                            500: '#EF4444',
                            600: '#DC2626',
                        },
                        blue: {
                            50: '#EFF6FF',
                            600: '#2563EB',
                        },
                        violet: {
                            50: '#F5F3FF',
                            600: '#7C3AED',
                        },
                        slate: {
                            50: '#F8FAFC',
                            100: '#F1F5F9',
                            200: '#E2E8F0',
                            300: '#CBD5E1',
                            400: '#94A3B8',
                            500: '#64748B',
                            600: '#475569',
                            700: '#334155',
                            900: '#0F172A',
                        },
                        stone: {
                            50: '#FAFAF9',
                        }
                    }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-200 text-slate-900 font-sans antialiased selection:bg-orange-100 selection:text-orange-900 min-h-screen flex items-center justify-center relative">

    <!-- Tombol Pemanggil Modal (Untuk Testing) -->
    <button onclick="openModal()" class="bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 px-6 rounded-xl shadow-md transition-all active:scale-95 absolute top-10">
        Buka Rating Modal
    </button>

    <!-- Modal Overlay -->
    <div id="ratingModal" class="fixed inset-0 z-50 flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300 px-4">
        
        <!-- Backdrop (klik luar untuk tutup) -->
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onclick="closeModal()"></div>
        
        <!-- Modal Card -->
        <div id="modalContent" class="bg-white w-full max-w-sm rounded-3xl p-6 relative z-10 transform scale-95 transition-transform duration-300 shadow-2xl flex flex-col">
            
            <!-- Close Button -->
            <button onclick="closeModal()" class="absolute top-4 right-4 text-slate-400 hover:text-slate-600 bg-slate-50 hover:bg-slate-100 p-2 rounded-full transition-colors active:scale-95">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>

            <!-- Header -->
            <div class="mb-5 flex items-center gap-2">
                <h3 class="text-xl font-extrabold text-slate-900 tracking-tight flex items-center gap-2">
                    <i data-lucide="star" class="w-6 h-6 text-amber-400 fill-amber-400"></i>
                    Beri Penilaian
                </h3>
            </div>

            <!-- Ratee Info Card -->
            <div class="bg-slate-50 border border-slate-100 rounded-2xl p-3 flex items-center gap-3 mb-6">
                <div class="w-12 h-12 rounded-full bg-slate-200 text-slate-600 flex items-center justify-center font-bold text-lg shrink-0 border border-white shadow-sm">
                    HI
                </div>
                <div>
                    <h4 class="font-bold text-slate-900 text-sm leading-tight">Hilman Al Hakim</h4>
                    <p class="text-[11px] font-medium text-slate-500 mt-0.5">Sebagai Quest Taker</p>
                    <p class="text-[10px] text-slate-400 truncate mt-0.5 max-w-[200px]">Beliin nasi goreng kantin A</p>
                </div>
            </div>

            <!-- Star Rating Section -->
            <div class="flex flex-col items-center mb-6">
                <p class="text-sm font-bold text-slate-900 mb-3">Bagaimana pengalamanmu?</p>
                
                <div class="flex gap-1.5" id="starContainer">
                    <!-- Bintang akan di-handle via JS -->
                    <button class="star-btn p-1 text-slate-200 hover:text-amber-400 transition-colors focus:outline-none" data-value="1">
                        <i data-lucide="star" class="w-8 h-8 pointer-events-none transition-all"></i>
                    </button>
                    <button class="star-btn p-1 text-slate-200 hover:text-amber-400 transition-colors focus:outline-none" data-value="2">
                        <i data-lucide="star" class="w-8 h-8 pointer-events-none transition-all"></i>
                    </button>
                    <button class="star-btn p-1 text-slate-200 hover:text-amber-400 transition-colors focus:outline-none" data-value="3">
                        <i data-lucide="star" class="w-8 h-8 pointer-events-none transition-all"></i>
                    </button>
                    <button class="star-btn p-1 text-slate-200 hover:text-amber-400 transition-colors focus:outline-none" data-value="4">
                        <i data-lucide="star" class="w-8 h-8 pointer-events-none transition-all"></i>
                    </button>
                    <button class="star-btn p-1 text-slate-200 hover:text-amber-400 transition-colors focus:outline-none" data-value="5">
                        <i data-lucide="star" class="w-8 h-8 pointer-events-none transition-all"></i>
                    </button>
                </div>
                
                <span id="ratingLabel" class="text-xs font-bold text-slate-400 mt-2 h-4 transition-colors">(Klik untuk pilih)</span>
            </div>

            <!-- Review Input -->
            <div class="flex flex-col gap-1.5 mb-6">
                <div class="flex justify-between items-end px-1">
                    <label for="reviewInput" class="text-xs font-bold text-slate-500 uppercase tracking-wider">Ulasan (Opsional)</label>
                    <span id="reviewCounter" class="text-[10px] font-semibold text-slate-400">0/300</span>
                </div>
                <textarea id="reviewInput" rows="3" placeholder="Bagikan pengalamanmu bekerja sama dengan Hilman..." maxlength="300"
                    class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-white text-slate-900 text-sm placeholder:text-slate-400 focus:outline-none focus:border-orange-500 focus:ring-4 focus:ring-orange-50 transition-all resize-none leading-relaxed"></textarea>
            </div>

            <!-- Action Buttons -->
            <div class="flex flex-col gap-3 mt-auto">
                <button id="submitBtn" disabled class="w-full bg-slate-200 text-slate-400 font-bold py-3.5 rounded-xl transition-all flex justify-center items-center gap-2 cursor-not-allowed">
                    <span id="submitText">Kirim Penilaian</span>
                    <i id="submitSpinner" data-lucide="loader-2" class="w-4 h-4 animate-spin hidden"></i>
                </button>
                <button onclick="closeModal()" class="w-full text-xs font-semibold text-slate-400 hover:text-slate-600 transition-colors py-2 active:scale-95">
                    Lewati untuk sekarang
                </button>
            </div>

        </div>
    </div>

    <!-- Toast Notification Simulation -->
    <div id="toast" class="fixed top-0 left-1/2 -translate-x-1/2 w-[calc(100%-2rem)] max-w-md transform -translate-y-full opacity-0 transition-all duration-300 z-[60] mt-4 pointer-events-none">
        <div class="flex items-center gap-3 px-4 py-3 rounded-xl shadow-md border bg-emerald-50 border-emerald-200 text-emerald-700">
            <i data-lucide="check-circle-2" class="w-5 h-5"></i>
            <p class="text-sm font-semibold">Terima kasih atas penilaianmu!</p>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // ---- Modal Logic ----
        const modal = document.getElementById('ratingModal');
        const content = document.getElementById('modalContent');
        
        function openModal() {
            modal.classList.remove('opacity-0', 'pointer-events-none');
            content.classList.remove('scale-95');
            content.classList.add('scale-100');
            resetForm();
        }

        function closeModal() {
            modal.classList.add('opacity-0', 'pointer-events-none');
            content.classList.remove('scale-100');
            content.classList.add('scale-95');
        }

        // ---- Star Rating Logic ----
        const stars = document.querySelectorAll('.star-btn');
        const ratingLabel = document.getElementById('ratingLabel');
        const submitBtn = document.getElementById('submitBtn');
        let selectedValue = 0;

        const labels = {
            1: "Sangat Buruk",
            2: "Buruk",
            3: "Cukup",
            4: "Baik",
            5: "Sangat Baik"
        };

        const colorClasses = {
            empty: ['text-slate-200'],
            filled: ['text-amber-400', 'fill-amber-400', 'scale-110']
        };

        function updateStars(value) {
            stars.forEach(star => {
                const starVal = parseInt(star.getAttribute('data-value'));
                // Use .querySelector('svg') instead of 'i' because Lucide replaces 'i' with 'svg'
                const icon = star.querySelector('svg');
                
                if (icon) {
                    if (starVal <= value) {
                        icon.classList.remove(...colorClasses.empty);
                        icon.classList.add(...colorClasses.filled);
                    } else {
                        icon.classList.remove(...colorClasses.filled);
                        icon.classList.add(...colorClasses.empty);
                    }
                }
            });

            if(value > 0) {
                ratingLabel.textContent = labels[value];
                ratingLabel.classList.replace('text-slate-400', 'text-orange-500');
            } else {
                ratingLabel.textContent = "(Klik untuk pilih)";
                ratingLabel.classList.replace('text-orange-500', 'text-slate-400');
            }
        }

        // Hover Effect
        stars.forEach(star => {
            star.addEventListener('mouseenter', () => {
                const hoverVal = parseInt(star.getAttribute('data-value'));
                updateStars(hoverVal);
            });
            
            star.addEventListener('mouseleave', () => {
                updateStars(selectedValue);
            });

            // Click Effect
            star.addEventListener('click', () => {
                selectedValue = parseInt(star.getAttribute('data-value'));
                updateStars(selectedValue);
                
                // Enable Submit Button
                submitBtn.disabled = false;
                submitBtn.classList.remove('bg-slate-200', 'text-slate-400', 'cursor-not-allowed');
                submitBtn.classList.add('bg-orange-500', 'hover:bg-orange-600', 'text-white', 'shadow-sm', 'active:scale-95');
            });
        });

        // ---- Review Counter Logic ----
        const reviewInput = document.getElementById('reviewInput');
        const reviewCounter = document.getElementById('reviewCounter');
        
        reviewInput.addEventListener('input', function() {
            const len = this.value.length;
            reviewCounter.textContent = `${len}/300`;
            if (len >= 290) reviewCounter.classList.replace('text-slate-400', 'text-red-500');
            else reviewCounter.classList.replace('text-red-500', 'text-slate-400');
        });

        // ---- Submit Simulation ----
        const submitText = document.getElementById('submitText');
        const submitSpinner = document.getElementById('submitSpinner');

        submitBtn.addEventListener('click', () => {
            if(selectedValue === 0) return;

            // Loading state
            submitBtn.disabled = true;
            submitText.textContent = "Mengirim...";
            submitSpinner.classList.remove('hidden');

            setTimeout(() => {
                closeModal();
                
                // Show Toast
                const toast = document.getElementById('toast');
                toast.classList.replace('-translate-y-full', 'translate-y-4');
                toast.classList.replace('opacity-0', 'opacity-100');
                
                setTimeout(() => {
                    toast.classList.replace('translate-y-4', '-translate-y-full');
                    toast.classList.replace('opacity-100', 'opacity-0');
                    
                    // Reset modal state
                    resetForm();
                }, 3000);

            }, 1000);
        });

        function resetForm() {
            selectedValue = 0;
            updateStars(0);
            reviewInput.value = '';
            reviewCounter.textContent = '0/300';
            
            submitBtn.disabled = true;
            submitBtn.classList.add('bg-slate-200', 'text-slate-400', 'cursor-not-allowed');
            submitBtn.classList.remove('bg-orange-500', 'hover:bg-orange-600', 'text-white', 'shadow-sm', 'active:scale-95');
            
            submitText.textContent = "Kirim Penilaian";
            submitSpinner.classList.add('hidden');
        }

    </script>
</body>
</html>
