<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rating Modal — YUKgas.in</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@600;700;800&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.460.0/dist/umd/lucide.min.js"></script>
    <link rel="stylesheet" href="/assets/style.css">

    <script>
        tailwind.config = {
            theme: { extend: {
                fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'], mono: ['"JetBrains Mono"', 'monospace'] },
                colors: {
                    sunset: '#FF6B35', 'sunset-light': '#FF9F1C', golden: '#FFB627',
                    teal: { 50: '#E6FAF5', 500: '#0CA789', 600: '#0A8E78' }, coral: '#FF4757',
                    cream: { DEFAULT: '#FFF8F0', deep: '#FFF0E0' },
                    espresso: '#2D1B12', mocha: '#8B7355', latte: '#B8A088',
                    borderWarm: '#FFE4D1'
                }
            }}
        }
    </script>
</head>
<body class="bg-cream text-espresso font-sans antialiased bg-dotted min-h-screen flex items-center justify-center">

    <!-- Centered demo content -->
    <div class="max-w-md mx-auto w-full px-4 py-10 relative z-10">

        <!-- Logo -->
        <div class="flex items-center justify-center gap-2 mb-10 animate-reveal">
            <div class="w-9 h-9 bg-gradient-to-br from-sunset to-sunset-light rounded-xl flex items-center justify-center shadow-warm">
                <i data-lucide="users-round" class="w-5 h-5 text-white"></i>
            </div>
            <span class="font-extrabold text-xl tracking-tight">YUKgas<span class="text-sunset">.in</span></span>
        </div>

        <!-- Trigger Card -->
        <div class="warm-card p-8 text-center animate-reveal delay-1">
            <div class="w-16 h-16 bg-golden/15 text-golden rounded-2xl flex items-center justify-center mx-auto mb-5 animate-float">
                <i data-lucide="star" class="w-8 h-8 fill-current"></i>
            </div>
            <h1 class="text-2xl font-extrabold mb-2">Preview Modal Rating</h1>
            <p class="text-sm text-mocha leading-relaxed mb-6">Ini adalah preview modal rating. Klik tombol untuk coba.</p>
            <button onclick="openRatingModal()" class="btn-sunset inline-flex items-center gap-2 animate-pulse-glow">
                <i data-lucide="star" class="w-5 h-5"></i>
                <span>Beri Rating</span>
            </button>
        </div>

        <!-- Info hint -->
        <p class="text-center text-xs text-latte mt-6 animate-reveal delay-2 flex items-center justify-center gap-1.5">
            <i data-lucide="info" class="w-3.5 h-3.5"></i>
            Demo page — modal bisa dibuka berulang kali
        </p>

    </div>

    <!-- Rating Modal Overlay -->
    <div id="ratingOverlay" class="fixed inset-0 bg-espresso/40 backdrop-blur-sm z-[100] hidden items-center justify-center p-4">
        <!-- Modal Card -->
        <div id="ratingModal" class="bg-white rounded-warm-lg w-full max-w-sm p-6 shadow-2xl relative max-h-[90vh] overflow-y-auto">

            <!-- Close -->
            <button onclick="closeRatingModal()" class="absolute top-4 right-4 w-9 h-9 flex items-center justify-center rounded-xl text-mocha hover:bg-cream-deep transition-colors z-10">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>

            <!-- Header -->
            <div class="text-center mb-5">
                <div class="w-14 h-14 bg-golden/15 text-golden rounded-2xl flex items-center justify-center mx-auto mb-3">
                    <i data-lucide="star" class="w-7 h-7 fill-current"></i>
                </div>
                <h2 class="text-xl font-extrabold">Beri Penilaian</h2>
            </div>

            <!-- Ratee Info -->
            <div class="bg-cream rounded-2xl p-3 mb-5 flex items-center gap-3 border-2 border-cream-deep">
                <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-sunset to-sunset-light flex items-center justify-center font-extrabold text-white text-lg flex-shrink-0">H</div>
                <div class="min-w-0 flex-1">
                    <h3 class="font-extrabold text-sm leading-tight">Hilman Al Hakim</h3>
                    <span class="text-xs text-mocha">Quest Taker</span>
                </div>
                <div class="flex items-center gap-1 px-2 py-1 bg-white rounded-lg border border-cream-deep">
                    <i data-lucide="star" class="w-3 h-3 text-golden fill-current"></i>
                    <span class="text-xs font-bold font-mono">4.9</span>
                </div>
            </div>

            <!-- Quest label -->
            <div class="flex items-center gap-2 mb-4 text-xs text-mocha">
                <i data-lucide="clipboard-list" class="w-3.5 h-3.5"></i>
                <span>Quest: <span class="font-bold text-espresso">Beliin Kopi Senja</span></span>
            </div>

            <!-- Stars -->
            <div class="text-center mb-2">
                <div id="starRow" class="flex items-center justify-center gap-2 mb-3">
                    <button type="button" data-star="1" onmouseenter="previewStar(1)" onmouseleave="resetPreview()" onclick="setStar(1)" class="star-btn transition-transform hover:scale-110 active:scale-90">
                        <i data-lucide="star" class="w-9 h-9 text-latte"></i>
                    </button>
                    <button type="button" data-star="2" onmouseenter="previewStar(2)" onmouseleave="resetPreview()" onclick="setStar(2)" class="star-btn transition-transform hover:scale-110 active:scale-90">
                        <i data-lucide="star" class="w-9 h-9 text-latte"></i>
                    </button>
                    <button type="button" data-star="3" onmouseenter="previewStar(3)" onmouseleave="resetPreview()" onclick="setStar(3)" class="star-btn transition-transform hover:scale-110 active:scale-90">
                        <i data-lucide="star" class="w-9 h-9 text-latte"></i>
                    </button>
                    <button type="button" data-star="4" onmouseenter="previewStar(4)" onmouseleave="resetPreview()" onclick="setStar(4)" class="star-btn transition-transform hover:scale-110 active:scale-90">
                        <i data-lucide="star" class="w-9 h-9 text-latte"></i>
                    </button>
                    <button type="button" data-star="5" onmouseenter="previewStar(5)" onmouseleave="resetPreview()" onclick="setStar(5)" class="star-btn transition-transform hover:scale-110 active:scale-90">
                        <i data-lucide="star" class="w-9 h-9 text-latte"></i>
                    </button>
                </div>
                <span id="starLabel" class="inline-block text-sm font-bold text-mocha px-4 py-1.5 rounded-full bg-cream-deep min-w-[140px]">Pilih rating</span>
            </div>

            <!-- Review textarea -->
            <div class="mt-5">
                <label class="flex items-center gap-2 text-sm font-extrabold mb-2">
                    <i data-lucide="message-square" class="w-4 h-4 text-sunset"></i>
                    Ulasan
                </label>
                <textarea id="reviewInput" maxlength="300" rows="3" placeholder="Tulis ulasan (opsional)" class="warm-input resize-none text-sm" oninput="onReviewInput()"></textarea>
                <div class="flex justify-end mt-1">
                    <span id="reviewCounter" class="text-xs text-latte font-mono font-semibold">0 / 300</span>
                </div>
            </div>

            <!-- Actions -->
            <div class="mt-5 space-y-3">
                <button id="submitRatingBtn" onclick="submitRating()" disabled class="btn-sunset w-full flex items-center justify-center gap-2 opacity-40 cursor-not-allowed">
                    <span id="ratingSubmitContent" class="flex items-center gap-2">
                        <i data-lucide="check" class="w-5 h-5"></i>
                        <span>Kirim Rating</span>
                    </span>
                </button>
                <button onclick="skipRating()" class="btn-ghost w-full text-sm">Lewati untuk sekarang</button>
            </div>

        </div>
    </div>

    <script src="/assets/app.js"></script>
    <script>
        // ===== State =====
        let currentRating = 0;

        const LABELS = {
            1: 'Sangat Buruk',
            2: 'Buruk',
            3: 'Cukup',
            4: 'Baik',
            5: 'Sangat Baik',
        };

        // ===== Open / Close =====
        function openRatingModal() {
            const overlay = document.getElementById('ratingOverlay');
            overlay.classList.remove('hidden');
            overlay.classList.add('flex');
            document.body.style.overflow = 'hidden';
            const modal = document.getElementById('ratingModal');
            modal.classList.remove('animate-bounce-in');
            void modal.offsetWidth;
            modal.classList.add('animate-bounce-in');
        }

        function closeRatingModal() {
            const overlay = document.getElementById('ratingOverlay');
            overlay.classList.add('hidden');
            overlay.classList.remove('flex');
            document.body.style.overflow = '';
            resetModal();
        }

        // ===== Star logic =====
        function paintStars(n) {
            document.querySelectorAll('.star-btn').forEach(btn => {
                const val = parseInt(btn.dataset.star);
                const icon = btn.querySelector('i');
                if (val <= n) {
                    icon.className = 'w-9 h-9 star-rating fill-current';
                } else {
                    icon.className = 'w-9 h-9 text-latte';
                }
            });
        }

        function updateLabel(n) {
            const label = document.getElementById('starLabel');
            if (n > 0) {
                label.textContent = LABELS[n];
                if (n >= 4) {
                    label.className = 'inline-block text-sm font-bold text-teal-500 px-4 py-1.5 rounded-full bg-teal-50 min-w-[140px]';
                } else if (n === 3) {
                    label.className = 'inline-block text-sm font-bold text-golden px-4 py-1.5 rounded-full bg-golden/15 min-w-[140px]';
                } else {
                    label.className = 'inline-block text-sm font-bold text-coral px-4 py-1.5 rounded-full bg-coral/10 min-w-[140px]';
                }
            } else {
                label.textContent = 'Pilih rating';
                label.className = 'inline-block text-sm font-bold text-mocha px-4 py-1.5 rounded-full bg-cream-deep min-w-[140px]';
            }
        }

        function previewStar(n) {
            paintStars(n);
            updateLabel(n);
        }

        function resetPreview() {
            paintStars(currentRating);
            updateLabel(currentRating);
        }

        function setStar(n) {
            currentRating = n;
            paintStars(n);
            updateLabel(n);
            validateRating();
            YG.haptic(8);
        }

        // ===== Review counter =====
        function onReviewInput() {
            const input = document.getElementById('reviewInput');
            const counter = document.getElementById('reviewCounter');
            const len = input.value.length;
            const pct = len / 300;
            counter.textContent = len + ' / 300';
            counter.className = 'text-xs font-mono font-semibold ';
            if (pct >= 1) {
                counter.className += 'text-coral';
            } else if (pct >= 0.9) {
                counter.className += 'text-sunset';
            } else {
                counter.className += 'text-latte';
            }
        }

        // ===== Validate =====
        function validateRating() {
            const btn = document.getElementById('submitRatingBtn');
            if (currentRating > 0) {
                btn.disabled = false;
                btn.classList.remove('opacity-40', 'cursor-not-allowed');
            } else {
                btn.disabled = true;
                btn.classList.add('opacity-40', 'cursor-not-allowed');
            }
        }

        // ===== Submit =====
        function submitRating() {
            const btn = document.getElementById('submitRatingBtn');
            const content = document.getElementById('ratingSubmitContent');
            if (btn.disabled) return;

            btn.disabled = true;
            content.innerHTML = '<i data-lucide="loader-2" class="w-5 h-5 animate-spin-slow"></i><span>Mengirim...</span>';
            if (window.lucide) lucide.createIcons();

            const rect = btn.getBoundingClientRect();
            setTimeout(() => {
                YG.confetti(rect.left + rect.width / 2, rect.top + rect.height / 2);
                YG.toast('Rating terkirim! Terima kasih', 'success');
                setTimeout(() => {
                    closeRatingModal();
                }, 1000);
            }, 800);
        }

        // ===== Skip =====
        function skipRating() {
            YG.toast('Rating dilewati', 'info', 2000);
            closeRatingModal();
        }

        // ===== Reset =====
        function resetModal() {
            currentRating = 0;
            paintStars(0);
            updateLabel(0);
            document.getElementById('reviewInput').value = '';
            onReviewInput();
            validateRating();
            const content = document.getElementById('ratingSubmitContent');
            content.innerHTML = '<i data-lucide="check" class="w-5 h-5"></i><span>Kirim Rating</span>';
            if (window.lucide) lucide.createIcons();
        }

        // ===== Close on backdrop click =====
        document.getElementById('ratingOverlay').addEventListener('click', (e) => {
            if (e.target.id === 'ratingOverlay') closeRatingModal();
        });
    </script>
</body>
</html>
