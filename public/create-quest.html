<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Posting Quest — YUKgas.in</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@600;700;800&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="/assets/style.css">

    <script>
        tailwind.config = {
            theme: { extend: {
                fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'], mono: ['"JetBrains Mono"', 'monospace'] },
                colors: {
                    sunset: '#FF6B35', 'sunset-light': '#FF9F1C', golden: '#FFB627',
                    teal: { 50: '#E6FAF5', 500: '#0CA789', 600: '#0A8E78' }, coral: '#FF4757',
                    cream: { DEFAULT: '#FFF8F0', deep: '#FFF0E0' },
                    espresso: '#2D1B12', mocha: '#8B7355', latte: '#B8A088',
                    borderWarm: '#FFE4D1'
                }
            }}
        }
    </script>
</head>
<body class="bg-cream text-espresso font-sans antialiased bg-dotted">

    <!-- Mobile frame -->
    <div class="max-w-md mx-auto min-h-screen relative flex flex-col">

        <!-- Header -->
        <header class="bg-white/90 backdrop-blur-lg border-b-2 border-cream-deep sticky top-0 z-50 px-4 py-3">
            <div class="flex items-center justify-between">
                <a href="/dashboard" class="w-10 h-10 flex items-center justify-center rounded-xl text-mocha hover:bg-cream-deep transition-colors">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </a>
                <h1 class="font-extrabold text-lg">Posting Quest</h1>
                <div class="w-10"></div>
            </div>
        </header>

        <!-- Main Form -->
        <main class="flex-1 overflow-y-auto px-4 py-5 pb-36 space-y-6">

            <!-- Hero -->
            <div class="animate-reveal">
                <h2 class="text-2xl font-extrabold tracking-tight mb-1">Buat Quest Baru</h2>
                <p class="text-sm text-mocha">Lengkapi form, posting, tunggu seseorang ambil.</p>
            </div>

            <!-- Section 1: Kategori -->
            <section class="animate-reveal delay-1">
                <label class="flex items-center gap-2 text-sm font-extrabold mb-3">
                    <i data-lucide="grid-2x2" class="w-4 h-4 text-sunset"></i>
                    Kategori <span class="text-coral">*</span>
                </label>
                <div class="grid grid-cols-2 gap-3">
                    <button type="button" onclick="selectCategory(this, 'transport')" data-cat="transport" class="cat-card warm-card p-4 flex flex-col items-center gap-2 text-center transition-all">
                        <div class="w-12 h-12 rounded-2xl bg-sunset/10 text-sunset flex items-center justify-center">
                            <i data-lucide="bike" class="w-6 h-6"></i>
                        </div>
                        <span class="text-sm font-bold">Transportasi</span>
                    </button>
                    <button type="button" onclick="selectCategory(this, 'food')" data-cat="food" class="cat-card warm-card p-4 flex flex-col items-center gap-2 text-center transition-all">
                        <div class="w-12 h-12 rounded-2xl bg-golden/15 text-golden flex items-center justify-center">
                            <i data-lucide="utensils-crossed" class="w-6 h-6"></i>
                        </div>
                        <span class="text-sm font-bold">Makanan</span>
                    </button>
                    <button type="button" onclick="selectCategory(this, 'admin')" data-cat="admin" class="cat-card warm-card p-4 flex flex-col items-center gap-2 text-center transition-all">
                        <div class="w-12 h-12 rounded-2xl bg-teal-50 text-teal-500 flex items-center justify-center">
                            <i data-lucide="printer" class="w-6 h-6"></i>
                        </div>
                        <span class="text-sm font-bold">Administrasi</span>
                    </button>
                    <button type="button" onclick="selectCategory(this, 'other')" data-cat="other" class="cat-card warm-card p-4 flex flex-col items-center gap-2 text-center transition-all">
                        <div class="w-12 h-12 rounded-2xl bg-mocha/10 text-mocha flex items-center justify-center">
                            <i data-lucide="package-2" class="w-6 h-6"></i>
                        </div>
                        <span class="text-sm font-bold">Lainnya</span>
                    </button>
                </div>
            </section>

            <!-- Section 2: Judul Quest -->
            <section class="animate-reveal delay-2">
                <label class="flex items-center gap-2 text-sm font-extrabold mb-2">
                    <i data-lucide="type" class="w-4 h-4 text-sunset"></i>
                    Judul Quest <span class="text-coral">*</span>
                </label>
                <input id="titleInput" type="text" maxlength="100" placeholder="Misal: Beliin kopi di kantin utama" class="warm-input" oninput="onTitleInput()">
                <div class="flex justify-end mt-1">
                    <span id="titleCounter" class="text-xs text-latte font-mono font-semibold">0 / 100</span>
                </div>
            </section>

            <!-- Section 3: Deskripsi -->
            <section class="animate-reveal delay-3">
                <label class="flex items-center gap-2 text-sm font-extrabold mb-2">
                    <i data-lucide="align-left" class="w-4 h-4 text-sunset"></i>
                    Deskripsi
                </label>
                <textarea id="descInput" maxlength="500" rows="3" placeholder="Jelaskan detail tugas..." class="warm-input resize-none" oninput="onDescInput()"></textarea>
                <div class="flex justify-end mt-1">
                    <span id="descCounter" class="text-xs text-latte font-mono font-semibold">0 / 500</span>
                </div>
            </section>

            <!-- Section 4: Lokasi & Deadline -->
            <section class="animate-reveal delay-4">
                <label class="flex items-center gap-2 text-sm font-extrabold mb-3">
                    <i data-lucide="map-pin" class="w-4 h-4 text-sunset"></i>
                    Lokasi & Deadline
                </label>
                <div class="grid grid-cols-2 gap-3">
                    <div class="relative">
                        <i data-lucide="map-pin" class="w-4 h-4 text-latte absolute left-4 top-1/2 -translate-y-1/2 z-10"></i>
                        <input id="locationInput" type="text" placeholder="Lokasi" class="warm-input pl-10 text-sm" oninput="updatePreview()">
                    </div>
                    <div class="relative">
                        <i data-lucide="clock" class="w-4 h-4 text-latte absolute left-4 top-1/2 -translate-y-1/2 z-10 pointer-events-none"></i>
                        <input id="deadlineInput" type="datetime-local" class="warm-input pl-10 text-sm" onchange="updatePreview()">
                    </div>
                </div>
            </section>

            <!-- Section 5: Kompensasi -->
            <section class="animate-reveal delay-5">
                <label class="flex items-center gap-2 text-sm font-extrabold mb-2">
                    <i data-lucide="wallet" class="w-4 h-4 text-sunset"></i>
                    Kompensasi <span class="text-coral">*</span>
                </label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 font-mono font-bold text-mocha text-lg z-10">Rp</span>
                    <input id="priceInput" type="text" inputmode="numeric" placeholder="0" class="warm-input pl-12 font-mono font-bold text-lg" oninput="onPriceInput()">
                </div>
                <p class="flex items-center gap-1 text-xs text-mocha mt-1.5">
                    <i data-lucide="info" class="w-3.5 h-3.5"></i>
                    Min. Rp 1.000
                </p>
            </section>

            <!-- Live Preview -->
            <section class="animate-reveal delay-6">
                <label class="flex items-center gap-2 text-sm font-extrabold mb-3">
                    <i data-lucide="eye" class="w-4 h-4 text-sunset"></i>
                    Preview Quest
                </label>
                <div id="previewCard" class="warm-card p-4">
                    <div>
                        <div class="flex items-start justify-between mb-2">
                            <div class="flex items-center gap-2">
                                <span id="previewCatBadge" class="text-xs font-bold text-latte bg-cream-deep px-2.5 py-1 rounded-full flex items-center gap-1">
                                    <i data-lucide="tag" class="w-3 h-3"></i> <span id="previewCatText">Kategori</span>
                                </span>
                                <span class="badge-open text-xs font-bold px-2.5 py-1 rounded-full">OPEN</span>
                            </div>
                            <span id="previewPrice" class="price-badge text-sm opacity-40">Rp 0</span>
                        </div>
                        <h3 id="previewTitle" class="font-extrabold text-base mb-1 text-latte">Judul Quest</h3>
                        <div class="flex items-center gap-3 text-xs text-mocha mb-3">
                            <span class="flex items-center gap-1"><i data-lucide="map-pin" class="w-3.5 h-3.5"></i> <span id="previewLocation">Lokasi</span></span>
                            <span class="flex items-center gap-1"><i data-lucide="clock" class="w-3.5 h-3.5"></i> <span id="previewDeadline">Deadline</span></span>
                        </div>
                        <div class="flex items-center justify-between pt-3 border-t border-cream-deep">
                            <div class="flex items-center gap-2">
                                <div class="w-7 h-7 rounded-lg bg-gradient-to-br from-sunset to-sunset-light flex items-center justify-center text-white text-xs font-extrabold">K</div>
                                <span class="text-xs font-bold">KAMU</span>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

        </main>

        <!-- Sticky Submit -->
        <div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white/95 backdrop-blur-lg border-t-2 border-cream-deep px-4 py-3 z-40">
            <button id="submitBtn" onclick="submitQuest()" disabled class="btn-sunset w-full flex items-center justify-center gap-2 opacity-40 cursor-not-allowed">
                <span id="submitContent" class="flex items-center gap-2">
                    <i data-lucide="send" class="w-5 h-5"></i>
                    <span>Posting Quest</span>
                </span>
            </button>
        </div>

    </div>

    <script src="/assets/app.js"></script>
    <script>
        // ===== Category config =====
        const CAT_META = {
            transport: { label: 'Transportasi', color: '#FF6B35', bg: 'bg-sunset/10', text: 'text-sunset', icon: 'bike' },
            food:      { label: 'Makanan',      color: '#FFB627', bg: 'bg-golden/15', text: 'text-golden', icon: 'utensils-crossed' },
            admin:     { label: 'Administrasi', color: '#0CA789', bg: 'bg-teal-50', text: 'text-teal-500', icon: 'printer' },
            other:     { label: 'Lainnya',      color: '#8B7355', bg: 'bg-mocha/10', text: 'text-mocha', icon: 'package-2' },
        };

        let selectedCategory = null;

        // ===== Category select =====
        function selectCategory(btn, cat) {
            document.querySelectorAll('.cat-card').forEach(c => {
                c.style.borderColor = '';
                c.style.background = '';
                c.style.boxShadow = '';
                c.classList.remove('ring-2', 'ring-offset-2');
            });
            const meta = CAT_META[cat];
            btn.style.borderColor = meta.color;
            btn.style.background = meta.color + '0D';
            btn.style.boxShadow = '0 0 0 4px ' + meta.color + '1A';
            selectedCategory = cat;
            updatePreview();
            validateForm();
        }

        // ===== Title input + counter =====
        function onTitleInput() {
            const input = document.getElementById('titleInput');
            const counter = document.getElementById('titleCounter');
            const len = input.value.length;
            const pct = len / 100;
            counter.textContent = len + ' / 100';
            counter.className = 'text-xs font-mono font-semibold mt-1 ';
            if (pct >= 1) {
                counter.className += 'text-coral';
            } else if (pct >= 0.9) {
                counter.className += 'text-sunset';
            } else {
                counter.className += 'text-latte';
            }
            updatePreview();
            validateForm();
        }

        // ===== Desc input + counter =====
        function onDescInput() {
            const input = document.getElementById('descInput');
            const counter = document.getElementById('descCounter');
            const len = input.value.length;
            const pct = len / 500;
            counter.textContent = len + ' / 500';
            counter.className = 'text-xs font-mono font-semibold mt-1 ';
            if (pct >= 1) {
                counter.className += 'text-coral';
            } else if (pct >= 0.9) {
                counter.className += 'text-sunset';
            } else {
                counter.className += 'text-latte';
            }
            updatePreview();
        }

        // ===== Price input — format rupiah =====
        function formatRupiah(num) {
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, '.');
        }

        function onPriceInput() {
            const input = document.getElementById('priceInput');
            let raw = input.value.replace(/\D/g, '');
            if (raw.length > 9) raw = raw.slice(0, 9);
            input.value = raw ? formatRupiah(raw) : '';
            updatePreview();
            validateForm();
        }

        // ===== Deadline relative =====
        function relativeDeadline(iso) {
            if (!iso) return 'Deadline';
            const target = new Date(iso);
            const now = new Date();
            const diffMs = target - now;
            if (diffMs <= 0) return 'Sudah lewat';
            const hours = Math.floor(diffMs / (1000 * 60 * 60));
            const days = Math.floor(hours / 24);
            if (days >= 1) return days + ' hari lagi';
            if (hours >= 1) return hours + ' jam lagi';
            const mins = Math.floor(diffMs / (1000 * 60));
            return mins + ' menit lagi';
        }

        // ===== Update Preview =====
        function updatePreview() {
            const title = document.getElementById('titleInput').value.trim();
            const location = document.getElementById('locationInput').value.trim();
            const deadline = document.getElementById('deadlineInput').value;
            const priceRaw = document.getElementById('priceInput').value.replace(/\D/g, '');

            // Title
            const titleEl = document.getElementById('previewTitle');
            if (title) {
                titleEl.textContent = title;
                titleEl.className = 'font-extrabold text-base mb-1 text-espresso';
            } else {
                titleEl.textContent = 'Judul Quest';
                titleEl.className = 'font-extrabold text-base mb-1 text-latte';
            }

            // Category badge
            const badge = document.getElementById('previewCatBadge');
            const badgeText = document.getElementById('previewCatText');
            const accent = document.getElementById('previewAccent');
            const badgeIcon = badge.querySelector('i');
            if (selectedCategory) {
                const meta = CAT_META[selectedCategory];
                badge.className = 'text-xs font-bold px-2.5 py-1 rounded-full flex items-center gap-1 ' + meta.bg + ' ' + meta.text;
                badgeText.textContent = meta.label;
                badgeIcon.setAttribute('data-lucide', meta.icon);
                accent.style.background = meta.color;
            } else {
                badge.className = 'text-xs font-bold text-latte bg-cream-deep px-2.5 py-1 rounded-full flex items-center gap-1';
                badgeText.textContent = 'Kategori';
                badgeIcon.setAttribute('data-lucide', 'tag');
                accent.style.background = '#B8A088';
            }

            // Location
            const locEl = document.getElementById('previewLocation');
            locEl.textContent = location || 'Lokasi';

            // Deadline
            const dlEl = document.getElementById('previewDeadline');
            dlEl.textContent = relativeDeadline(deadline);

            // Price
            const priceEl = document.getElementById('previewPrice');
            if (priceRaw) {
                priceEl.textContent = 'Rp ' + formatRupiah(priceRaw);
                priceEl.className = 'price-badge text-sm';
            } else {
                priceEl.textContent = 'Rp 0';
                priceEl.className = 'price-badge text-sm opacity-40';
            }

            if (window.lucide) lucide.createIcons();
        }

        // ===== Validate =====
        function validateForm() {
            const title = document.getElementById('titleInput').value.trim();
            const priceRaw = document.getElementById('priceInput').value.replace(/\D/g, '');
            const ok = title && selectedCategory && parseInt(priceRaw) >= 1000;
            const btn = document.getElementById('submitBtn');
            if (ok) {
                btn.disabled = false;
                btn.classList.remove('opacity-40', 'cursor-not-allowed');
            } else {
                btn.disabled = true;
                btn.classList.add('opacity-40', 'cursor-not-allowed');
            }
        }

        // ===== Submit =====
        function submitQuest() {
            const btn = document.getElementById('submitBtn');
            const content = document.getElementById('submitContent');
            if (btn.disabled) return;

            const priceRaw = document.getElementById('priceInput').value.replace(/\D/g, '');
            if (parseInt(priceRaw) < 1000) {
                YG.toast('Kompensasi minimal Rp 1.000', 'error');
                return;
            }

            // Loading state
            btn.disabled = true;
            content.innerHTML = '<i data-lucide="loader-2" class="w-5 h-5 animate-spin-slow"></i><span>Memposting...</span>';
            if (window.lucide) lucide.createIcons();

            const rect = btn.getBoundingClientRect();
            setTimeout(() => {
                YG.confetti(rect.left + rect.width / 2, rect.top + rect.height / 2);
                YG.toast('Quest berhasil diposting!', 'success');
                setTimeout(() => {
                    YG.navigate('/quest-detail');
                }, 1200);
            }, 800);
        }
    </script>
</body>
</html>
